<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form-Input</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        color: aliceblue;
      }
      input {
        padding: 10px;
        font-size: 16px;
      }
      button {
        padding: 10px 15px;
        font-size: 16px;
        margin-left: 10px;
        cursor: pointer;
        background-color: rebeccapurple;
        color: white;
      }
      ul {
        margin-top: 20px;
      }
      li {
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <input type="text" id="input-pemain" placeholder="Masukan Nama Pemain" />
    <button id="btn-tambah">Tambah Pemain</button>
    <ul id="daftar-pemain"></ul>
    <script src="script.js"></script>
  </body>
</html>
